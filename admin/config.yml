site_url: https://avon-park-historical-society.github.io/avonparkhistoricalsociety.com/
backend:
  name: github
  auth_type: proxy
  base_url: https://sveltia-cms-auth.michael-joseph-miller.workers.dev/
  repo: Avon-Park-Historical-Society/avonparkhistoricalsociety.com

  branch: main

media_folder: "assets/photos" # Where CMS uploads go
public_folder: "/"

collections:
  - name: "home"
    label: "Home Page"
    delete: false
    files:
      - name: "content"
        label: "Home Page Content"
        file: "_pages/home.md"
        fields:
          - {
              label: "Layout",
              name: "layout",
              widget: "hidden",
              default: "home",
            }
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Permalink",
              name: "permalink",
              widget: "hidden",
              default: "/",
            }
          - { label: "Hero Image", name: "hero_image", widget: "image" }
          - { label: "Hero Link", name: "hero_link", widget: "string" }
          - { label: "Welcome Quote", name: "welcome_quote", widget: "text" }
          - {
              label: "Welcome Author",
              name: "welcome_author",
              widget: "string",
            }
          - { label: "Video 1 Title", name: "video_1_title", widget: "string" }
          - { label: "Video 1 ID", name: "video_1_id", widget: "string" }
          - { label: "Video 2 Title", name: "video_2_title", widget: "string" }
          - { label: "Video 2 ID", name: "video_2_id", widget: "string" }
          - { label: "Intro Content", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Other Pages"
    folder: "_pages"
    filter: { field: "layout", value: "default" }
    create: true
    fields:
      - {
          label: "Layout",
          name: "layout",
          widget: "hidden",
          default: "default",
        }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "articles"
    label: "Articles"
    folder: "_articles"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - {
          label: "Featured Image",
          name: "image",
          widget: "image",
          required: false,
        }
      - {
          label: "Summary",
          name: "description",
          widget: "text",
          required: false,
        }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "photos"
    label: "Photos"
    folder: "_photos"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Photo", name: "image", widget: "image" }
      - {
          label: "Description",
          name: "description",
          widget: "text",
          required: false,
        }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "quizzes"
    label: "Quizzes"
    folder: "_quizzes"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - {
          label: "Featured Image",
          name: "image",
          widget: "image",
          required: false,
        }
      - {
          label: "Summary",
          name: "description",
          widget: "text",
          required: false,
        }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "podcasts"
    label: "Podcasts"
    folder: "_podcasts"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - {
          label: "Audio URL",
          name: "audio",
          widget: "string",
          required: false,
          hint: "Link to the podcast audio",
        }
      - {
          label: "Featured Image",
          name: "image",
          widget: "image",
          required: false,
        }
      - {
          label: "Summary",
          name: "description",
          widget: "text",
          required: false,
        }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "events"
    label: "Events"
    folder: "_events"
    create: true
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Event Date", name: "date", widget: "datetime" }
      - {
          label: "Location",
          name: "location",
          widget: "string",
          required: false,
        }
      - {
          label: "Featured Image",
          name: "image",
          widget: "image",
          required: false,
        }
      - {
          label: "Description",
          name: "description",
          widget: "text",
          required: false,
        }
      - { label: "Details", name: "body", widget: "markdown", required: false }
